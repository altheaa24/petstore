services:
  # Backend Service
  - type: web
    name: petstore-backend
    env: java
    buildCommand: cd backend && mvn clean install -DskipTests
    startCommand: cd backend && java -jar target/petstore-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
      - key: DB_USER
        fromDatabase:
          name: petstore-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: petstore-db
          property: password

  # Frontend Service
  - type: web
    name: petstore-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: petstore-backend
          type: web
          property: url
        suffix: /api

databases:
  - name: petstore-db
    plan: free
