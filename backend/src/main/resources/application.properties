spring.application.name=petstore-backend

# Fixed: Removed "ON" from DB_CLOSE_ON_DELAY -> changed to DB_CLOSE_DELAY=-1
spring.datasource.url=jdbc:h2:mem:petstore;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configurations
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Enable H2 Dashboard Console Access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Enable Persistent Servlet Environment Web Container
spring.main.web-application-type=servlet
server.port=8080

# Prevent DevTools from restarting or triggering shutdowns during startup seeding
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false